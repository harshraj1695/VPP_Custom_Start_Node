# ─────────────────────────────────────────────────────────────────────────────
# startup.conf
#
# VPP startup configuration file.
# Run VPP with:   vpp -c startup.conf
# ─────────────────────────────────────────────────────────────────────────────

# Basic VPP process settings
unix {
  # Run in the foreground (no daemon) so you can see log output
  interactive

  # Log file location
  log /tmp/vpp.log

  # VPP CLI socket - lets vppctl connect to this VPP instance
  cli-listen /run/vpp/cli.sock

  # Full core dumps on crash (useful for debugging)
  full-coredump
}

# API settings (for vppctl and external programs to talk to VPP)
api-trace {
  on   # log all API messages (useful for debugging)
}

# CPU / threading settings
cpu {
  # Run VPP on CPU core 0 only (simple single-threaded setup)
  # For production you'd add worker threads here
  main-core 0
}

# Memory settings
# buffers-per-numa = how many packet buffers VPP pre-allocates
# 1024 is enough for testing; production systems use 64000+
buffers {
  buffers-per-numa 1024
}

# Plugin settings
plugins {
  # Load all plugins by default
  plugin default { enable }

  # Make sure our plugin is enabled
  plugin my_plugin_plugin.so { enable }
}
